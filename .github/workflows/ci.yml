name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run tests
        run: pytest -q

      - name: Run example solver
        run: python -m baanschema.cli --example
